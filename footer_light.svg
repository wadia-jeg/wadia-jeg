<svg width="100%" viewBox="0 0 830 160" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Animated footer art</title>
  <desc>Geometric animated art with orbiting nodes and pulsing grid, light mode</desc>

  <style>
    .gl { stroke: #eee; stroke-width: 0.5; }
    @keyframes spin-slow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    @keyframes spin-rev  { from { transform: rotate(0deg); } to { transform: rotate(-360deg); } }
    @keyframes pulse     { 0%,100% { opacity: 0.2; } 50% { opacity: 0.7; } }
    @keyframes orbit     { from { transform: rotate(0deg) translateX(38px) rotate(0deg); } to { transform: rotate(360deg) translateX(38px) rotate(-360deg); } }
    @keyframes orbit2    { from { transform: rotate(120deg) translateX(58px) rotate(-120deg); } to { transform: rotate(480deg) translateX(58px) rotate(-480deg); } }
    @keyframes orbit3    { from { transform: rotate(240deg) translateX(22px) rotate(-240deg); } to { transform: rotate(600deg) translateX(22px) rotate(-600deg); } }
    @keyframes blink     { 0%,100% { opacity: 1; } 50% { opacity: 0; } }
    @keyframes fadein    { from { opacity: 0; } to { opacity: 1; } }
    @keyframes scanline  { from { transform: translateY(-10px); } to { transform: translateY(160px); } }
    .r1 { animation: spin-slow 18s linear infinite; transform-origin: 415px 80px; }
    .r2 { animation: spin-rev 12s linear infinite; transform-origin: 415px 80px; }
    .r3 { animation: spin-slow 30s linear infinite; transform-origin: 415px 80px; }
    .p1 { animation: pulse 3s ease-in-out infinite; }
    .p2 { animation: pulse 3s ease-in-out infinite 1s; }
    .p3 { animation: pulse 3s ease-in-out infinite 2s; }
    .o1 { animation: orbit 8s linear infinite; transform-origin: 415px 80px; }
    .o2 { animation: orbit2 13s linear infinite; transform-origin: 415px 80px; }
    .o3 { animation: orbit3 5s linear infinite; transform-origin: 415px 80px; }
    .cursor { animation: blink 1s step-end infinite; }
    .fi { animation: fadein 2s ease-out both; }
    .scan { animation: scanline 4s linear infinite; opacity: 0.03; }
  </style>

  <rect width="830" height="160" fill="#fafafa"/>
  <rect class="scan" x="0" y="0" width="830" height="6" fill="#00a07a"/>

  <line class="gl" x1="0" y1="40" x2="830" y2="40"/>
  <line class="gl" x1="0" y1="80" x2="830" y2="80"/>
  <line class="gl" x1="0" y1="120" x2="830" y2="120"/>
  <line class="gl" x1="166" y1="0" x2="166" y2="160"/>
  <line class="gl" x1="332" y1="0" x2="332" y2="160"/>
  <line class="gl" x1="498" y1="0" x2="498" y2="160"/>
  <line class="gl" x1="664" y1="0" x2="664" y2="160"/>

  <circle class="p1" cx="166" cy="80" r="2" fill="#00a07a"/>
  <circle class="p2" cx="332" cy="80" r="2" fill="#00a07a"/>
  <circle class="p3" cx="498" cy="80" r="2" fill="#00a07a"/>
  <circle class="p1" cx="664" cy="80" r="2" fill="#00a07a"/>
  <circle class="p2" cx="415" cy="40" r="1.5" fill="#00a07a"/>
  <circle class="p3" cx="415" cy="120" r="1.5" fill="#00a07a"/>

  <circle class="r1 p1" cx="415" cy="80" r="55" fill="none" stroke="#00a07a" stroke-width="0.8"/>
  <circle class="r2" cx="415" cy="80" r="38" fill="none" stroke="#b2e8d8" stroke-width="0.8"/>
  <circle class="r3 p2" cx="415" cy="80" r="70" fill="none" stroke="#d4f3ea" stroke-width="0.8"/>

  <circle cx="415" cy="80" r="4" fill="#00a07a"/>
  <circle cx="415" cy="80" r="8" fill="none" stroke="#00a07a" stroke-width="0.5" opacity="0.4"/>

  <circle class="o1" cx="415" cy="80" r="3" fill="#00a07a"/>
  <circle class="o2" cx="415" cy="80" r="2.5" fill="#00a07a"/>
  <circle class="o3" cx="415" cy="80" r="2" fill="#00a07a"/>

  <text class="fi" x="60" y="72" font-family="'JetBrains Mono', monospace" font-size="11" fill="#bbb" letter-spacing="1">// process</text>
  <text class="fi" x="60" y="90" font-family="'JetBrains Mono', monospace" font-size="11" fill="#00a07a" letter-spacing="1">.compile()</text>
  <text class="fi" x="60" y="108" font-family="'JetBrains Mono', monospace" font-size="11" fill="#ddd" letter-spacing="1">.then(ship)</text>

  <text class="fi" x="590" y="72" font-family="'JetBrains Mono', monospace" font-size="11" fill="#bbb" letter-spacing="1">// status</text>
  <text class="fi" x="590" y="90" font-family="'JetBrains Mono', monospace" font-size="11" fill="#00a07a" letter-spacing="1">online <tspan class="cursor">_</tspan></text>
  <text class="fi" x="590" y="108" font-family="'JetBrains Mono', monospace" font-size="11" fill="#ddd" letter-spacing="1">v2.0.0</text>
</svg>
